services:
  postgres:
    image: postgres:16-alpine
    container_name: nuoidev-postgres
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USERNAME:-nuoidev}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nuoidev_secret}
      POSTGRES_DB: ${DB_DATABASE:-nuoidev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-nuoidev}']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nuoidev-backend
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-nuoidev}
      DB_PASSWORD: ${DB_PASSWORD:-nuoidev_secret}
      DB_DATABASE: ${DB_DATABASE:-nuoidev}
      PORT: 3000
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: npm run start:dev

volumes:
  pgdata:
